server {
    listen 80;
    # root trỏ vào public/ — KHÔNG phải root dự án!
    # Đây là nguyên tắc bảo mật: chỉ public/ được phơi ra internet.
    # Nếu trỏ nhầm vào /var/www/html thì file .env (chứa DB password) tải được từ browser!
    root /var/www/html/public;
    index index.php;

    # charset để tên file CSV tiếng Nhật không vỡ
    charset utf-8;

    location / {
        # try_files: 1) có file tĩnh đúng tên? trả luôn
        #            2) không → đẩy hết vào index.php (Front Controller pattern)
        # Mọi request /api/attendance/check-in thực chất đều chạy qua index.php,
        # Laravel router mới quyết định gọi Controller nào.
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # "app" = tên service trong docker-compose. Docker tự phân giải tên → IP nội bộ.
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # chặn truy cập file ẩn (.env, .git...) — lớp phòng thủ thứ 2
    location ~ /\. {
        deny all;
    }
}